<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notícias</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #0f172a;
      color: #f8fafc;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 650px;
      padding: 40px;
      background: #111827;
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
    }

    h1 {
      color: #38bdf8;
      margin-bottom: 16px;
    }

    p {
      font-size: 18px;
      color: #cbd5e1;
      line-height: 1.6;
    }

    a {
      color: #38bdf8;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>Página de Notícias</h1>
    <p>Esta página foi criada para o redirecionamento de <strong>/blog</strong> para <strong>/noticias</strong>.</p>
  </main>
</body>
</html>
