<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projeto Prático - Deploy Web</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #0f172a;
      color: #f8fafc;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 700px;
      padding: 40px;
      background: #111827;
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
    }

    h1 {
      color: #38bdf8;
      margin-bottom: 16px;
      font-size: 36px;
    }

    p {
      font-size: 20px;
      line-height: 1.6;
      color: #cbd5e1;
    }

    .badge {
      display: inline-block;
      margin-top: 24px;
      padding: 10px 18px;
      border-radius: 999px;
      background: #0369a1;
      color: #ffffff;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>Olá, meu nome é Giovanny</h1>
    <p>Bem-vindo ao meu projeto prático de deploy de aplicação web.</p>
    <p>Esta página está sendo servida por um servidor Nginx em ambiente Linux via Docker.</p>
    <div class="badge">Desafio Analista Web Júnior</div>
  </main>
</body>
</html>
